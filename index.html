<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f0f0f0">
    <title>Eventos by AJRA</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="images/logo.webp">
    <meta name="description" content="EVENTOS by AJRA">
    <meta property="og:title" content="EVENTOS by AJRA">
    <meta property="og:description" content="Calendario de eventos de AJRA">
    <meta property="og:image" content="images/logo.webp">
    <meta property="og:url" content="https://eventos.ajra.es">
    <script src="https://beamanalytics.b-cdn.net/beam.min.js" data-token="d475f634-84bb-448f-9a73-b0576d734398"
        async></script>
    <link href="css/eventos.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <a href="https://ajra.es">
            <img src="images/AJRA.webp" alt="AJRA" width="150" height="150" class="avatar">
        </a>
    </header>
    <div class="home">
        <img src="images/logo.webp" alt="AJRA" width="225" height="225">

        <a
            href="webcal://calendar.google.com/calendar/ical/84d41ef1a1a31d6e5fa01c477a7b7c5e93ca524098f0474afadac4f50d6fd64e@group.calendar.google.com/public/basic.ics">
            <h2 class="suscribirse">SUSCRIBETE AL CALENDARIO</h2>
        </a>
    </div>
    <div class="filter-buttons">
        <button onclick="filterEvents('todos')" class="botonesfiltro active" data-category="todos" aria-pressed="true">TODOS</button>
        <button onclick="filterEvents('cineytv')" class="botonesfiltro" data-category="cineytv" aria-pressed="false">CINEYTV</button>
        <button onclick="filterEvents('curiosidades')" class="botonesfiltro" data-category="curiosidades" aria-pressed="false">CURIOSIDADES</button>
        <button onclick="filterEvents('deportes')" class="botonesfiltro" data-category="deportes" aria-pressed="false">DEPORTES</button>
        <button onclick="filterEvents('festividades')" class="botonesfiltro" data-category="festividades" aria-pressed="false">FESTIVIDADES</button>
        <button onclick="filterEvents('tecnologia')" class="botonesfiltro" data-category="tecnologia" aria-pressed="false">TECNOLOGÍA</button>
        <button onclick="filterEvents('videojuegos')" class="botonesfiltro" data-category="videojuegos" aria-pressed="false">VIDEOJUEGOS</button>
        <input type="text" id="searchInput" class="buscador" oninput="searchEvents()" placeholder="Buscar evento..." aria-label="Buscar evento por título o descripción">
    </div>
    <p id="resultsCount" class="results-count" aria-live="polite"></p>
    <div id="events" class="row"></div>
    <footer>
        <script>
            document.write(new Date().getFullYear());
        </script>
        &copy; Desarrollado con 🧠 & 💛 por &lt;/AJRA&gt;
    </footer>

    <script>
        const CONFIG = {
            DATA_URL: 'data/events.json',
            SITE_ID: 'eventos'
        };

        const eventsContainer = document.getElementById('events');
        const placeholderimagen = 'images/logo.webp';
        let allEvents = [];
        let activeCategory = 'todos';

        const formatDate = (date) => new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(date);

        const calculateDaysRemaining = (eventDate) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const eventDay = new Date(eventDate);
            eventDay.setHours(0, 0, 0, 0);
            const diffDays = Math.ceil((eventDay - today) / (1000 * 60 * 60 * 24));
            return diffDays > 0 ? `FALTAN ${diffDays} DÍAS` : 'HOY';
        };

        const parseEventDate = (dateString) => {
            if (!dateString) return null;
            const [year, month, day] = dateString.split('-').map(Number);
            if (!year || !month || !day) return null;
            return new Date(year, month - 1, day);
        };

        const normalizeEvent = (event) => {
            const rawDate = event.date || event.FechaOrden;
            const eventDate = parseEventDate(rawDate);

            return {
                id: event.id || `${event.title || event.titulo || 'sin-titulo'}-${rawDate || 'sin-fecha'}`,
                titulo: event.title || event.titulo || 'Sin Título',
                eventDate,
                descripcion: event.description || event.descripcion || '',
                imagen: event.image || event.imagen || placeholderimagen,
                categoria: event.category || event.categoria || 'General',
                url: event.url || event.IMDbURL || event.URL || '',
                status: event.status || 'published',
                sites: Array.isArray(event.sites) ? event.sites : ['eventos'],
                brands: Array.isArray(event.brands) ? event.brands : [],
                tags: Array.isArray(event.tags) ? event.tags : []
            };
        };

        const displayEvents = (events) => {
            eventsContainer.innerHTML = '';
            const resultsCount = document.getElementById('resultsCount');
            resultsCount.textContent = events.length === 1 ? '1 evento encontrado' : `${events.length} eventos encontrados`;
            if (events.length === 0) {
                eventsContainer.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1 / -1; margin-top:2rem;">No se encontraron eventos próximos.</p>';
                return;
            }

            events.forEach(({ titulo, eventDate, descripcion, imagen, url }) => {
                const card = document.createElement('div');
                card.className = 'card';
                const imageHtml = url && url.trim() !== ''
                    ? `<a href="${url}" target="_blank" rel="noopener noreferrer"><img src="${imagen}" class="event-image" alt="${titulo}" loading="lazy" decoding="async"></a>`
                    : `<img src="${imagen}" class="event-image" alt="${titulo}" loading="lazy" decoding="async">`;

                card.innerHTML = `
                ${imageHtml}
                <div class="card-body">
                    <h2 class="titulo">${titulo}</h2>
                    <p class="fecha">${formatDate(eventDate)}</p>
                    <div class="faltan-container">
                        <div class="faltan">${calculateDaysRemaining(eventDate)}</div>
                        <button class="calendar-btn" onclick="downloadICS('${titulo.replace(/'/g, "\\'")}', '${eventDate.toISOString()}', '${(descripcion || '').replace(/'/g, "\\'")}')">
                            <i class="fas fa-calendar-alt"></i>
                        </button>
                    </div>
                </div>`;
                eventsContainer.appendChild(card);
            });
        };

        const getVisibleEvents = () => {
            const searchString = document.getElementById('searchInput').value.toLowerCase().trim();
            return allEvents.filter(event => {
                const matchesCategory = activeCategory === 'todos' || (event.categoria && event.categoria.toLowerCase() === activeCategory.toLowerCase());
                const matchesSearch = !searchString
                    || (event.titulo ? event.titulo.toLowerCase().includes(searchString) : false)
                    || (event.descripcion ? event.descripcion.toLowerCase().includes(searchString) : false);
                return matchesCategory && matchesSearch;
            });
        };

        const renderCurrentEvents = () => displayEvents(getVisibleEvents());

        const fetchJsonEvents = async () => {
            try {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                eventsContainer.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1 / -1; margin-top:2rem;">Cargando eventos...</p>';

                const response = await fetch(CONFIG.DATA_URL, { cache: 'no-store' });
                if (!response.ok) throw new Error(`Error JSON: ${response.status} ${response.statusText}`);

                const data = await response.json();
                const records = Array.isArray(data.events) ? data.events : [];
                allEvents = records
                    .map(normalizeEvent)
                    .filter(event => event && event.status === 'published' && Array.isArray(event.sites) && event.sites.includes(CONFIG.SITE_ID)
                        && event.eventDate instanceof Date && !isNaN(event.eventDate.getTime()) && event.eventDate >= today)
                    .sort((a, b) => a.eventDate - b.eventDate);

                displayEvents(allEvents);
            } catch (error) {
                console.error('Error al cargar eventos desde JSON:', error);
                eventsContainer.innerHTML = `<p style="text-align:center; color: red; width:100%; grid-column: 1 / -1;">Error cargando eventos: ${error.message}</p>`;
            }
        };

        function filterEvents(categoria) {
            activeCategory = categoria;
            const buttons = document.querySelectorAll('.botonesfiltro');
            if (categoria === 'todos') {
                buttons.forEach(button => {
                    button.classList.remove('inactive');
                    button.classList.toggle('active', button.dataset.category === 'todos');
                    button.setAttribute('aria-pressed', button.dataset.category === 'todos' ? 'true' : 'false');
                });
            } else {
                buttons.forEach(button => {
                    button.classList.remove('active');
                    button.classList.add('inactive');
                    button.setAttribute('aria-pressed', 'false');
                });
                const activeButton = [...buttons].find(button => button.dataset.category === categoria);
                if (activeButton) {
                    activeButton.classList.add('active');
                    activeButton.classList.remove('inactive');
                    activeButton.setAttribute('aria-pressed', 'true');
                }
            }
            renderCurrentEvents();
        }

        function searchEvents() {
            renderCurrentEvents();
        }

        function downloadICS(titulo, fechaISO, descripcion) {
            const eventDate = new Date(fechaISO);
            const formatDateForICS = (date) => `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`;
            const now = new Date();
            const timestamp = now.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            const cleanText = (text) => text.replace(/[^\w\s]/gi, '').replace(/\n/g, '\\n').replace(/,/g, '\\,');

            const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//CULTURAFREAK//EVENTOS//ES\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\nBEGIN:VEVENT\nUID:${timestamp}-culturafreak@ajra.es\nDTSTART;VALUE=DATE:${formatDateForICS(eventDate)}\nSUMMARY:${cleanText(titulo)}\nDESCRIPTION:${cleanText(descripcion || 'Evento de CULTURAFREAK')}\nORGANIZER;CN=CULTURAFREAK:MAILTO:eventos@ajra.es\nSTATUS:CONFIRMED\nTRANSP:TRANSPARENT\nEND:VEVENT\nEND:VCALENDAR`;

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `${cleanText(titulo)}.ics`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(link.href);
        }

        document.addEventListener('DOMContentLoaded', function () {
            fetchJsonEvents();
            document.getElementById('searchInput').addEventListener('input', searchEvents);
        });
    </script>
</body>

</html>
